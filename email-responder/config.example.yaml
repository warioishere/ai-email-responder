email: "your@email.com"
password: "#y0ur-p4$$w0rd"
imap_server: "imap.mailserver.com"
anthropic_api_key: "your-anthropic_api_key"
openai_api_key: "your-openai_api_key"
openai_model_name: "gpt-4-turbo-preview"  # or "gpt-3.5-turbo"
claude_model_name: "claude-3-opus-20240229"  # or other Claude model versions
max_tokens: 1000
temperature: 0.7
mark_as_read: true
blacklist:
  - "spam@example.com"
  - "newsletter@"
  - "noreply@"
system_prompt: |
  You are an email assistant. Generate helpful and professional responses to emails.
  When responding:
  1. Maintain a professional tone
  2. Address all points in the original email
  3. Be concise but thorough
  4. Sign off appropriately
# Triage settings - classify emails before generating drafts
triage_enabled: true                    # Set to false to disable triage (old behavior)
triage_confidence_threshold: 0.7        # Below this confidence, email goes to human review
# Matrix integration - notifications for emails needing human review
matrix_enabled: true
matrix_homeserver: "https://matrix.example.com"
matrix_access_token: "your-access-token"
matrix_room_id: "!roomid:matrix.example.com"
# Article linking - reference blog articles in email responses
article_linking_enabled: false